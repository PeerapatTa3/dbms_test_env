<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — ระบบคลังสินค้า</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;500;600&family=JetBrains+Mono:wght@400;600;700&display=swap');
:root{
  --bg:#0d0d0d;--card:#161616;--primary:#00e676;--secondary:#ff6d00;
  --danger:#ff4444;--border:#2a2a2a;--border2:#333;--text:#f0f0f0;--dim:#888;--input:#1a1a1a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}

.login-wrap{width:100%;max-width:380px;padding:24px}

.logo{text-align:center;margin-bottom:32px}
.logo-icon{font-size:2.5rem;margin-bottom:8px}
.logo-title{font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:700;color:var(--primary);letter-spacing:3px}
.logo-sub{font-size:.78rem;color:var(--dim);margin-top:4px}

.login-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px}

label{display:block;font-size:.75rem;color:var(--dim);margin-bottom:6px;margin-top:16px;letter-spacing:.5px}
label:first-of-type{margin-top:0}

input[type=text],input[type=password]{
  width:100%;padding:10px 14px;background:var(--input);border:1px solid var(--border2);
  color:var(--text);border-radius:8px;font-family:'IBM Plex Sans Thai',sans-serif;
  font-size:.95rem;outline:none;transition:border .2s;
}
input:focus{border-color:var(--primary)}

.btn-login{
  width:100%;padding:12px;margin-top:20px;
  background:var(--primary);color:#000;border:none;border-radius:8px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-weight:700;font-size:.95rem;
  cursor:pointer;transition:all .2s;letter-spacing:.5px;
}
.btn-login:hover{opacity:.9;transform:translateY(-1px)}
.btn-login:active{transform:scale(.98)}
.btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none}

.error-msg{
  background:rgba(255,68,68,.1);border:1px solid rgba(255,68,68,.3);
  color:var(--danger);padding:10px 14px;border-radius:8px;
  font-size:.82rem;margin-top:12px;display:none;text-align:center;
}
.error-msg.show{display:block}

.rank-badge{
  display:inline-block;padding:2px 10px;border-radius:20px;
  font-family:'JetBrains Mono',monospace;font-size:.68rem;font-weight:700;
  margin-left:6px;
}
.rank-admin{background:rgba(255,109,0,.15);color:var(--secondary);border:1px solid rgba(255,109,0,.3)}
.rank-staff{background:rgba(0,230,118,.15);color:var(--primary);border:1px solid rgba(0,230,118,.3)}

.divider{border:none;border-top:1px solid var(--border);margin:20px 0}

/* logged in state */
.logged-in{display:none;text-align:center}
.logged-in.show{display:block}
.login-form.hide{display:none}

.user-avatar{
  width:60px;height:60px;border-radius:50%;background:rgba(0,230,118,.1);
  border:2px solid var(--primary);display:flex;align-items:center;justify-content:center;
  font-size:1.6rem;margin:0 auto 12px;
}
.user-name{font-size:1.1rem;font-weight:600;margin-bottom:4px}
.user-rank{font-size:.8rem;color:var(--dim)}

.nav-btns{display:flex;flex-direction:column;gap:10px;margin-top:20px}
.btn-nav{
  padding:12px;border:1px solid var(--border2);background:var(--input);
  color:var(--text);border-radius:8px;font-family:'IBM Plex Sans Thai',sans-serif;
  font-weight:600;font-size:.9rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
}
.btn-nav:hover{border-color:var(--primary);color:var(--primary);background:rgba(0,230,118,.05)}
.btn-nav.admin-only{border-color:rgba(255,109,0,.3);color:var(--secondary)}
.btn-nav.admin-only:hover{background:rgba(255,109,0,.05)}

.btn-logout{
  width:100%;padding:10px;margin-top:8px;
  background:transparent;color:var(--dim);border:1px solid var(--border2);border-radius:8px;
  font-family:'IBM Plex Sans Thai',sans-serif;font-size:.85rem;cursor:pointer;transition:all .2s;
}
.btn-logout:hover{border-color:var(--danger);color:var(--danger)}

.spinner-inline{
  width:16px;height:16px;border:2px solid rgba(0,0,0,.3);border-top-color:#000;
  border-radius:50%;animation:spin .6s linear infinite;display:inline-block;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

.footer{text-align:center;margin-top:20px;font-size:.72rem;color:var(--dim);font-family:'JetBrains Mono',monospace}
</style>
</head>
<body>

<div class="login-wrap">
  <div class="logo">
    <div class="logo-icon">🏗</div>
    <div class="logo-title">WAREHOUSE</div>
    <div class="logo-sub">ระบบจัดการคลังสินค้า</div>
  </div>

  <div class="login-card">

    <!-- FORM LOGIN -->
    <div class="login-form" id="loginForm">
      <label>Username</label>
      <input type="text" id="username" placeholder="กรอก username" autocomplete="username">
      <label>Password</label>
      <input type="password" id="password" placeholder="กรอก password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') doLogin()">
      <button class="btn-login" id="loginBtn" onclick="doLogin()">เข้าสู่ระบบ</button>
      <div class="error-msg" id="errorMsg">Username หรือ Password ไม่ถูกต้อง</div>
    </div>

    <!-- LOGGED IN -->
    <div class="logged-in" id="loggedIn">
      <div class="user-avatar" id="userAvatar">👤</div>
      <div class="user-name" id="userName">—</div>
      <div class="user-rank" id="userRankText">—</div>

      <div class="divider"></div>

      <div class="nav-btns">
        <button class="btn-nav" onclick="goTo('staff.html')">
          🛒 หน้า Staff (ขายสินค้า)
        </button>
        <button class="btn-nav admin-only" id="btnAdmin" onclick="goTo('admin.html')" style="display:none">
          ⚙️ หน้า Admin (จัดการระบบ)
        </button>
      </div>

      <button class="btn-logout" onclick="doLogout()">ออกจากระบบ</button>
    </div>

  </div>

  <div class="footer">v1.0 · Supabase + HTML/JS</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://xxhfqxrehsummjmpkoxu.supabase.co'
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh4aGZxeHJlaHN1bW1qbXBrb3h1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2MDI5NjYsImV4cCI6MjA4ODE3ODk2Nn0.ioFvUUwPddFPUQeDT2CWydTLmI2s-Pd_N_viEFSHSvg'
const { createClient } = supabase
const db = createClient(SUPABASE_URL, SUPABASE_KEY)

// ตรวจสอบ session เดิม
window.onload = function(){
  const saved = sessionStorage.getItem('currentUser');
  if(saved){
    const user = JSON.parse(saved);
    showLoggedIn(user);
  }
};

window.doLogin = async function(){
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const errEl = document.getElementById('errorMsg');

  if(!username || !password){
    errEl.textContent = 'กรุณากรอก Username และ Password';
    errEl.classList.add('show'); return;
  }

  // แสดง loading
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-inline"></span>กำลังเข้าสู่ระบบ...';
  errEl.classList.remove('show');

  // query จากตาราง account
  // ⚠️ หมายเหตุ: ระบบนี้เปรียบเทียบ password แบบ plain text
  // ถ้าจะ deploy จริงควรใช้ bcrypt hash
  const { data, error } = await db
    .from('account')
    .select('id, username, rank')
    .eq('username', username)
    .eq('password', password)
    .single();

  btn.disabled = false;
  btn.innerHTML = 'เข้าสู่ระบบ';

  if(error || !data){
    errEl.textContent = 'Username หรือ Password ไม่ถูกต้อง';
    errEl.classList.add('show');
    document.getElementById('password').value = '';
    return;
  }

  // เข้าสู่ระบบสำเร็จ
  sessionStorage.setItem('currentUser', JSON.stringify(data));
  showLoggedIn(data);
};

function showLoggedIn(user){
  document.getElementById('loginForm').classList.add('hide');
  document.getElementById('loggedIn').classList.add('show');

  const isAdmin = user.rank === 'admin';
  document.getElementById('userAvatar').textContent = isAdmin ? '👑' : '👤';
  document.getElementById('userName').textContent = user.username;
  document.getElementById('userRankText').innerHTML =
    `<span class="rank-badge ${isAdmin?'rank-admin':'rank-staff'}">${isAdmin?'ADMIN':'STAFF'}</span>`;

  if(isAdmin){
    document.getElementById('btnAdmin').style.display = 'flex';
  }
}

window.doLogout = function(){
  sessionStorage.removeItem('currentUser');
  document.getElementById('loginForm').classList.remove('hide');
  document.getElementById('loggedIn').classList.remove('show');
  document.getElementById('username').value = '';
  document.getElementById('password').value = '';
  document.getElementById('errorMsg').classList.remove('show');
};

window.goTo = function(page){
  window.location.href = page;
};
</script>
</body>
</html>
